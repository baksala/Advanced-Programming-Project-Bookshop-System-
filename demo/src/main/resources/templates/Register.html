<main class="w-full md:w-1/2 flex flex-col justify-center px-margin-mobile md:px-margin-desktop py-12">
<div class="w-full max-w-[420px] mx-auto">
<div class="mb-12 text-center md:text-left">
<span class="font-headline-md text-headline-md text-primary tracking-tight">The Bibliophile</span>
</div>
<div class="mb-10">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-2">Join the Library</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Register to discover rare finds and curate your personal collection.</p>
</div>
<form action="#" class="space-y-8" method="POST">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="name">Full Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface font-body-md text-body-md py-2 px-0 transition-colors placeholder:text-outline-variant/50" id="name" name="name" placeholder="e.g. Virginia Woolf" required="" type="text"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface font-body-md text-body-md py-2 px-0 transition-colors placeholder:text-outline-variant/50" id="email" name="email" placeholder="virginia@bloomsbury.co.uk" required="" type="email"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface font-body-md text-body-md py-2 px-0 transition-colors placeholder:text-outline-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="confirm_password">Confirm Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-on-surface font-body-md text-body-md py-2 px-0 transition-colors placeholder:text-outline-variant/50" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-start pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 border-outline-variant rounded-sm text-on-tertiary-container focus:ring-on-tertiary-container bg-surface cursor-pointer" id="newsletter" name="newsletter" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="newsletter">
                            Subscribe to our newsletter for updates on rare arrivals and literary events.
                        </label>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-on-tertiary-container text-on-tertiary py-4 px-4 rounded DEFAULT font-body-md text-body-md font-bold tracking-wide hover:opacity-90 transition-opacity shadow-sm flex justify-center items-center gap-2" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 text-center md:text-left">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already a member?
                    <a class="text-on-tertiary-container underline hover:text-primary transition-colors font-semibold" href="#">Sign in here</a>
</p>
</div>
</div>
