<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Sign In – The Bibliotech</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex">

  <!-- Left: Form panel -->
  <div class="w-full lg:w-1/2 flex flex-col justify-center px-8 sm:px-12 lg:px-16 xl:px-24 bg-surface min-h-screen">

    <!-- Brand -->
    <div class="mb-12">
      <a href="/" class="font-headline-md text-headline-md text-primary tracking-tight hover:opacity-80 transition-opacity">
        The Bibliotech
      </a>
    </div>

    <div class="w-full max-w-md mx-auto lg:mx-0">

      <!-- Header -->
      <div class="mb-10">
        <h2 class="font-headline-xl text-headline-xl text-on-surface mb-2">Welcome Back</h2>
        <p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to access your collection.</p>
      </div>

      <!-- Success message from registration -->
      <div th:if="${successMessage}"
           class="mb-6 flex items-center gap-2 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl text-sm">
        <span class="material-symbols-outlined" style="font-size:18px">check_circle</span>
        <span th:text="${successMessage}"></span>
      </div>

      <!-- Error message -->
      <div th:if="${loginError}"
           class="mb-6 flex items-center gap-2 bg-error-container border border-error/30 text-on-error-container px-4 py-3 rounded-xl text-sm">
        <span class="material-symbols-outlined" style="font-size:18px">error</span>
        <span th:text="${loginError}"></span>
      </div>

      <!-- Logout message -->
      <div th:if="${logoutMessage}"
           class="mb-6 flex items-center gap-2 bg-surface-container border border-outline-variant text-on-surface-variant px-4 py-3 rounded-xl text-sm">
        <span class="material-symbols-outlined" style="font-size:18px">info</span>
        <span th:text="${logoutMessage}"></span>
      </div>

      <!--
        Bonus: Cookie Handling
        When "Remember Me" is checked, the form posts to /login-remember which sets
        a "rememberedEmail" cookie (7 days), then forwards to Spring Security's /login.
        When unchecked it posts directly to /login (no cookie).
        On page load, if the cookie exists the email field is pre-filled automatically.
      -->
      <form th:action="${rememberMe != null and rememberMe} ? @{/login-remember} : @{/login}"
            method="post" class="space-y-7" id="loginForm" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Email — pre-filled from cookie if "Remember Me" was set previously -->
        <div>
          <label class="block font-label-sm text-label-sm text-on-surface-variant uppercase mb-2" for="username">
            Email Address
          </label>
          <input id="username" name="username" type="email"
                 th:value="${rememberedEmail}"
                 placeholder="reader@example.com"
                 required autocomplete="email"
                 class="block w-full border-0 border-b border-outline-variant bg-transparent py-3 px-0 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-0 transition-colors placeholder:text-outline-variant/50"/>
          <p class="text-error text-xs mt-1 hidden" id="emailErr">Please enter a valid email address.</p>
        </div>

        <!-- Password with show/hide toggle -->
        <div>
          <label class="block font-label-sm text-label-sm text-on-surface-variant uppercase mb-2" for="password">
            Password
          </label>
          <div class="relative">
            <input id="password" name="password" type="password"
                   placeholder="••••••••"
                   required autocomplete="current-password"
                   class="block w-full border-0 border-b border-outline-variant bg-transparent py-3 px-0 pr-10 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-0 transition-colors placeholder:text-outline-variant/50"/>
            <button type="button" onclick="togglePwd('password','eyeLogin')"
                    class="absolute right-0 bottom-3 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none"
                    aria-label="Show/hide password">
              <span id="eyeLogin" class="material-symbols-outlined" style="font-size:20px">visibility_off</span>
            </button>
          </div>
          <p class="text-error text-xs mt-1 hidden" id="pwdErr">Password is required.</p>
        </div>

        <!-- Remember me + forgot -->
        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <!--
              Bonus: Cookie — checking this box causes the form to post to /login-remember,
              which sets the rememberedEmail cookie before forwarding to Spring Security.
            -->
            <input id="rememberMeCheck" name="rememberMe" type="checkbox"
                   th:checked="${rememberMe}"
                   onchange="updateFormAction(this)"
                   class="w-4 h-4 rounded border-outline-variant text-on-tertiary-container focus:ring-on-tertiary-container bg-transparent"/>
            <span class="font-body-md text-body-md text-on-surface-variant text-sm">Remember me</span>
          </label>
          <a href="#" class="font-body-md text-body-md text-on-tertiary-container hover:text-tertiary-container transition-colors text-sm">
            Forgot password?
          </a>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button type="submit"
                  class="flex w-full justify-center items-center gap-2 rounded bg-on-tertiary-container px-4 py-4 font-body-lg text-body-lg font-bold text-on-primary hover:opacity-90 transition-opacity shadow-sm">
            Sign In
            <span class="material-symbols-outlined" style="font-size:20px">arrow_forward</span>
          </button>
        </div>
      </form>

      <script>
        // Bonus: Cookie — dynamically switch form action based on "Remember Me" checkbox
        function updateFormAction(checkbox) {
          const form = document.getElementById('loginForm');
          form.action = checkbox.checked ? '/login-remember' : '/login';
        }
      </script>

      <!-- Register link -->
      <div class="mt-8 text-center">
        <p class="font-body-md text-body-md text-on-surface-variant">
          Don't have an account?
          <a th:href="@{/register}" class="font-bold text-primary hover:underline transition-colors">Join the library</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Right: Decorative image panel -->
  <div class="hidden lg:block lg:w-1/2 relative bg-surface-container-high border-l border-outline-variant">
    <div class="absolute inset-0 bg-cover bg-center"
         style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCFHFUxFgIY06ShqyFu9c5L4s8hoJcPNV0CJVFcZP4FHWNl53rOWFlXJjGfn1ne31R80z9TOiHynqvlhPWnKJamEZzFaN0t84s1vpPeDPcXxrOSzzL5q1jGALZ9Wgt7z8hkYu34goKktpUXZKtbPcg-5J2t_bqUeuzlyT-xg4X4EosUARbsUfa22fM9SG_2D3xYsXtNgjf7rH38SwFwdq8RrVKWUCBLqsQABOdcrXGbID42p-J-tNNPe6_dUrkemGhj_my9e5pFu3A');">
    </div>
    <div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
    <!-- Quote overlay -->
    <div class="absolute bottom-12 left-8 right-8">
      <blockquote class="text-white text-xl font-headline-md italic leading-relaxed drop-shadow-lg">
        "A reader lives a thousand lives before he dies."
      </blockquote>
      <p class="text-white/70 text-sm mt-2">— George R.R. Martin</p>
    </div>
  </div>

  <script>
    function togglePwd(inputId, eyeId) {
      const input = document.getElementById(inputId);
      const eye   = document.getElementById(eyeId);
      if (input.type === 'password') {
        input.type = 'text';
        eye.textContent = 'visibility';
      } else {
        input.type = 'password';
        eye.textContent = 'visibility_off';
      }
    }

    // Simple client-side validation feedback
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      let ok = true;
      const email = document.getElementById('username');
      const pwd   = document.getElementById('password');
      const emailErr = document.getElementById('emailErr');
      const pwdErr   = document.getElementById('pwdErr');

      if (!email.value || !email.validity.valid) {
        emailErr.classList.remove('hidden'); ok = false;
      } else { emailErr.classList.add('hidden'); }

      if (!pwd.value) {
        pwdErr.classList.remove('hidden'); ok = false;
      } else { pwdErr.classList.add('hidden'); }

      if (!ok) e.preventDefault();
    });
  </script>
</body>
</html>
