<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex">
<!-- Left Canvas: Split layout for premium feel instead of generic centered box -->
<div class="w-full lg:w-1/2 flex flex-col justify-center px-margin-mobile sm:px-12 lg:px-margin-desktop xl:px-32 bg-surface">
<!-- Minimal Brand Anchor -->
<div class="mb-16">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">The Bibliophile</h1>
</div>
<div class="w-full max-w-md mx-auto lg:mx-0">
<!-- Header -->
<div class="mb-10">
<h2 class="font-headline-xl text-headline-xl text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to access your curated collection.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-8" method="POST">
<!-- Archival Input Style: Bottom border only -->
<div class="relative">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase mb-1" for="email">Email Address</label>
<input class="block w-full border-0 border-b border-outline-variant bg-transparent py-3 px-0 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-0 transition-colors" id="email" name="email" placeholder="reader@example.com" required="" type="email"/>
</div>
<div class="relative">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase mb-1" for="password">Password</label>
<input class="block w-full border-0 border-b border-outline-variant bg-transparent py-3 px-0 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-0 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Utilities Row -->
<div class="flex items-center justify-between pt-2">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-on-tertiary-container focus:ring-on-tertiary-container bg-transparent" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-body-md text-body-md text-on-tertiary-container hover:text-tertiary-container transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
</div>
<!-- Primary Button -->
<div class="pt-4">
<button class="flex w-full justify-center rounded-DEFAULT bg-on-tertiary-container px-3 py-4 font-body-lg text-body-lg font-bold text-on-primary hover:opacity-90 transition-opacity shadow-sm items-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:underline" href="#">Request an invitation</a>
</p>
</div>
</div>
</div>
<!-- Right Canvas: Evocative Imagery -->
<div class="hidden lg:block lg:w-1/2 relative bg-surface-container-high border-l border-outline-variant">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A serene and sophisticated interior view of a high-end independent bookstore. The scene is bathed in soft, diffused natural light filtering through large windows, illuminating stacks of vintage and contemporary books resting on minimal, dark wood tables. The aesthetic is warm minimalism, featuring a palette of soft cream walls, deep navy structural elements, and terracotta accents. The overall mood is quiet, scholarly, and inviting, emphasizing tactile textures like linen book covers and smooth matte surfaces." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCFHFUxFgIY06ShqyFu9c5L4s8hoJcPNV0CJVFcZP4FHWNl53rOWFlXJjGfn1ne31R80z9TOiHynqvlhPWnKJamEZzFaN0t84s1vpPeDPcXxrOSzzL5q1jGALZ9Wgt7z8hkYu34goKktpUXZKtbPcg-5J2t_bqUeuzlyT-xg4X4EosUARbsUfa22fM9SG_2D3xYsXtNgjf7rH38SwFwdq8RrVKWUCBLqsQABOdcrXGbID42p-J-tNNPe6_dUrkemGhj_my9e5pFu3A');">
</div>

<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
