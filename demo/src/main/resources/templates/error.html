<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Something went wrong – The Bibliotech</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">

<th:block th:replace="~{fragments/nav :: topnav}"></th:block>

<main class="flex-grow flex items-center justify-center pt-[64px] pb-24 px-margin-mobile">
  <div class="max-w-xl w-full text-center">

    <!-- Status code displayed large -->
    <p class="font-headline-xl text-[96px] leading-none font-bold text-surface-container-high select-none"
       th:text="${status != null ? status : '500'}">500</p>

    <!-- Icon -->
    <div class="flex justify-center mt-2 mb-6">
      <span class="material-symbols-outlined text-on-surface-variant" style="font-size:48px"
            th:text="${status == 404} ? 'search_off' : (${status == 403} ? 'lock' : 'error')">error</span>
    </div>

    <!-- Title -->
    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-3"
        th:text="${status == 404} ? 'Page Not Found'
               : (${status == 403} ? 'Access Denied'
               : 'Something Went Wrong')">Something Went Wrong</h1>

    <!-- Human-readable message -->
    <p class="font-body-lg text-body-lg text-on-surface-variant mb-8"
       th:text="${status == 404} ? 'The page you\'re looking for doesn\'t exist or has been moved.'
               : (${status == 403} ? 'You don\'t have permission to view this page.'
               : 'An unexpected error occurred. Please try again or contact us if the problem persists.')">
      An unexpected error occurred.
    </p>

    <!-- Technical detail (collapsed, dev only) -->
    <div th:if="${message != null and message != ''}"
         class="mb-8 bg-surface-container border border-outline-variant rounded-xl p-4 text-left">
      <p class="text-xs text-on-surface-variant font-mono break-all" th:text="${message}"></p>
    </div>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/"
         class="bg-primary text-on-primary font-bold px-8 py-3 rounded hover:opacity-90 transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-size:18px">home</span>
        Go to Homepage
      </a>
      <button onclick="history.back()"
              class="border border-outline-variant text-on-surface font-semibold px-8 py-3 rounded hover:bg-surface-container transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
        Go Back
      </button>
      <a th:href="@{/contact}"
         class="border border-outline-variant text-on-surface font-semibold px-8 py-3 rounded hover:bg-surface-container transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-size:18px">support_agent</span>
        Contact Us
      </a>
    </div>

    <!-- Admin hint (only for admins, shows error path) -->
    <div sec:authorize="hasRole('ADMIN')" class="mt-10 text-left">
      <div class="bg-surface-container border border-outline-variant rounded-xl p-5">
        <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-3">Admin Debug Info</p>
        <div class="flex flex-col gap-1 text-xs text-on-surface-variant font-mono">
          <div><span class="text-on-surface font-semibold">Status: </span><span th:text="${status}">—</span></div>
          <div><span class="text-on-surface font-semibold">Error: </span><span th:text="${error}">—</span></div>
          <div><span class="text-on-surface font-semibold">Path: </span><span th:text="${path}">—</span></div>
          <div th:if="${trace != null}">
            <span class="text-on-surface font-semibold">Trace: </span>
            <span class="break-all" th:text="${#strings.abbreviate(trace, 300)}">—</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<th:block th:replace="~{fragments/nav :: footer}"></th:block>
</body>
</html>
