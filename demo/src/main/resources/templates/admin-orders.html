<!DOCTYPE html>
<html class="light" lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Orders – Admin Console</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex">

<th:block th:replace="~{fragments/admin-sidebar :: sidebar('orders')}"></th:block>

<div class="ml-64 flex-1 p-8">

  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="font-headline-lg text-headline-lg text-on-surface">Orders</h1>
      <p class="text-on-surface-variant mt-1">Manage all customer orders</p>
    </div>
    <div class="flex items-center gap-3 text-sm text-on-surface-variant">
      <span class="material-symbols-outlined text-sm">calendar_today</span>
      All time
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-4 gap-4 mb-8">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Total Orders</p>
      <p class="font-headline-md text-2xl text-on-surface" th:text="${allOrders.size()}">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Pending</p>
      <p class="font-headline-md text-2xl text-[#c86a47]" th:text="${pendingCount}">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Shipped</p>
      <p class="font-headline-md text-2xl text-green-600" th:text="${shippedCount}">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Total Revenue</p>
      <p class="font-headline-md text-2xl text-on-surface" th:text="'$' + ${#numbers.formatDecimal(totalRevenue, 1, 2)}">$0.00</p>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
    <div class="p-4 border-b border-outline-variant flex items-center gap-3">
      <span class="material-symbols-outlined text-on-surface-variant">search</span>
      <input type="text" id="order-search" placeholder="Search by order number or customer..." onkeyup="filterOrders()"
             class="flex-1 bg-transparent text-on-surface placeholder-on-surface-variant focus:outline-none text-sm"/>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" id="orders-table">
        <thead class="bg-surface-container text-on-surface-variant font-semibold uppercase text-xs tracking-wider">
          <tr>
            <th class="px-6 py-3 text-left">Order #</th>
            <th class="px-6 py-3 text-left">Customer</th>
            <th class="px-6 py-3 text-left">Date</th>
            <th class="px-6 py-3 text-left">Status</th>
            <th class="px-6 py-3 text-right">Total</th>
            <th class="px-6 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-outline-variant">
          <tr th:each="order : ${allOrders}" class="hover:bg-surface-container transition-colors">
            <td class="px-6 py-4 font-mono font-semibold text-on-surface" th:text="${order.orderNumber}">BBL-000000</td>
            <td class="px-6 py-4">
              <p class="font-semibold text-on-surface" th:text="${order.user.fullName}">Name</p>
              <p class="text-on-surface-variant text-xs" th:text="${order.user.email}">email</p>
            </td>
            <td class="px-6 py-4 text-on-surface-variant" th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">Date</td>
            <td class="px-6 py-4">
              <th:block th:with="s=${order.status.name()}">
                <span th:class="${s == 'PENDING'}    ? 'text-xs font-bold px-2 py-1 rounded bg-yellow-100 text-yellow-800'
                              : (s == 'PROCESSING'   ? 'text-xs font-bold px-2 py-1 rounded bg-blue-100 text-blue-800'
                              : (s == 'SHIPPED'      ? 'text-xs font-bold px-2 py-1 rounded bg-green-100 text-green-800'
                              : (s == 'DELIVERED'    ? 'text-xs font-bold px-2 py-1 rounded bg-green-200 text-green-900'
                              : 'text-xs font-bold px-2 py-1 rounded bg-red-100 text-red-800')))"
                      th:text="${order.status}">PENDING</span>
              </th:block>
            </td>
            <td class="px-6 py-4 text-right font-semibold text-on-surface" th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</td>
            <td class="px-6 py-4 text-right">
              <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="inline-flex gap-1">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="status" class="text-xs border border-outline-variant rounded px-2 py-1 focus:outline-none">
                  <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">Pending</option>
                  <option value="PROCESSING" th:selected="${order.status.name() == 'PROCESSING'}">Processing</option>
                  <option value="SHIPPED" th:selected="${order.status.name() == 'SHIPPED'}">Shipped</option>
                  <option value="DELIVERED" th:selected="${order.status.name() == 'DELIVERED'}">Delivered</option>
                  <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">Cancelled</option>
                </select>
                <button type="submit" class="bg-primary text-on-primary text-xs px-2 py-1 rounded hover:bg-opacity-90 transition-all">Update</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(allOrders)}">
            <td colspan="6" class="px-6 py-12 text-center text-on-surface-variant">No orders yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function filterOrders() {
    const q = document.getElementById('order-search').value.toLowerCase();
    document.querySelectorAll('#orders-table tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
</script>
</body>
</html>
