<!DOCTYPE html>
<html class="light" lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Inventory – Admin Console</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex">

<th:block th:replace="~{fragments/admin-sidebar :: sidebar('inventory')}"></th:block>

<div class="ml-64 flex-1 p-8">

  <!-- Flash -->
  <div th:if="${flashSuccess}" class="mb-6 bg-green-100 border border-green-300 text-green-800 px-4 py-3 rounded-xl text-sm" th:text="${flashSuccess}"></div>

  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="font-headline-lg text-headline-lg text-on-surface">Inventory</h1>
      <p class="text-on-surface-variant mt-1">Manage your book catalogue</p>
    </div>
    <a th:href="@{/admin/books/new}"
       class="bg-primary text-on-primary font-semibold px-5 py-2.5 rounded-lg hover:bg-opacity-90 transition-all flex items-center gap-2">
      <span class="material-symbols-outlined text-sm">add</span>
      Add New Book
    </a>
  </div>

  <!-- Stats row -->
  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Total Books</p>
      <p class="font-headline-md text-on-surface text-2xl" th:text="${totalBooks}">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Low Stock (&lt;5)</p>
      <p class="font-headline-md text-error text-2xl" th:text="${lowStockCount}">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5">
      <p class="text-on-surface-variant text-sm mb-1">Out of Stock</p>
      <p class="font-headline-md text-error text-2xl" th:text="${outOfStockCount}">0</p>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
    <div class="p-4 border-b border-outline-variant flex items-center gap-3">
      <span class="material-symbols-outlined text-on-surface-variant">search</span>
      <input type="text" id="inv-search" placeholder="Search books..." onkeyup="filterTable()"
             class="flex-1 bg-transparent text-on-surface placeholder-on-surface-variant focus:outline-none text-sm"/>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" id="inv-table">
        <thead class="bg-surface-container text-on-surface-variant font-semibold uppercase text-xs tracking-wider">
          <tr>
            <th class="px-6 py-3 text-left">Book</th>
            <th class="px-6 py-3 text-left">Genre</th>
            <th class="px-6 py-3 text-right">Price</th>
            <th class="px-6 py-3 text-right">Stock</th>
            <th class="px-6 py-3 text-left">Badge</th>
            <th class="px-6 py-3 text-left">Added</th>
            <th class="px-6 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-outline-variant">
          <tr th:each="book : ${books}" class="hover:bg-surface-container transition-colors">
            <td class="px-6 py-4 flex items-center gap-3">
              <img th:src="${book.coverImageUrl != null ? book.coverImageUrl : 'https://placehold.co/40x56/e6eeff/45464d?text=Book'}"
                   th:alt="${book.title}"
                   onerror="this.src='https://placehold.co/40x56/e6eeff/45464d?text=Book'"
                   class="w-10 h-14 object-cover rounded border border-secondary-fixed shrink-0"/>
              <div>
                <p class="font-semibold text-on-surface" th:text="${book.title}">Title</p>
                <p class="text-on-surface-variant text-xs" th:text="${book.author}">Author</p>
              </div>
            </td>
            <td class="px-6 py-4 text-on-surface-variant" th:text="${book.genre}">Genre</td>
            <td class="px-6 py-4 text-right font-semibold text-on-surface" th:text="'$' + ${book.price}">$0.00</td>
            <td class="px-6 py-4 text-right">
              <span th:class="${book.stockQuantity == 0} ? 'text-error font-bold' : (${book.stockQuantity < 5} ? 'text-[#c86a47] font-bold' : 'text-on-surface')"
                    th:text="${book.stockQuantity}">0</span>
            </td>
            <td class="px-6 py-4">
              <span th:if="${book.badge != null}"
                    class="bg-[#c86a47] text-white text-xs px-2 py-0.5 rounded"
                    th:text="${book.badge}">Badge</span>
            </td>
            <td class="px-6 py-4 text-on-surface-variant" th:text="${book.addedDate}">Date</td>
            <td class="px-6 py-4 text-right">
              <form th:action="@{/admin/books/{id}/delete(id=${book.id})}" method="post"
                    onsubmit="return confirm('Delete this book?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="text-error hover:bg-error-container px-2 py-1 rounded transition-colors text-xs">
                  <span class="material-symbols-outlined text-sm">delete</span>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(books)}">
            <td colspan="7" class="px-6 py-12 text-center text-on-surface-variant">No books in inventory.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function filterTable() {
    const q = document.getElementById('inv-search').value.toLowerCase();
    document.querySelectorAll('#inv-table tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
</script>
</body>
</html>
