<!DOCTYPE html>
<html class="light" lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Edit Profile – The Bibliotech</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">

<th:block th:replace="~{fragments/nav :: topnav}"></th:block>

<main class="flex-grow pt-[80px] pb-16">
  <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop mt-10 flex flex-col md:flex-row gap-8">

    <!-- Account sidebar -->
    <aside class="w-full md:w-56 flex-shrink-0">
      <div class="pb-5">
        <h1 class="font-headline-lg text-headline-lg text-primary">Account</h1>
      </div>
      <nav class="flex flex-col gap-1">
        <a th:href="@{/account/profile}"
           class="font-label-sm text-label-sm text-on-tertiary-container bg-surface-container-high rounded px-4 py-3 flex items-center gap-3">
          <span class="material-symbols-outlined" style="font-size:18px">manage_accounts</span> Edit Profile
        </a>
        <a th:href="@{/account/orders}"
           class="font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors rounded px-4 py-3 flex items-center gap-3">
          <span class="material-symbols-outlined" style="font-size:18px">receipt_long</span> Order History
        </a>
        <a th:href="@{/account/wishlist}"
           class="font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors rounded px-4 py-3 flex items-center gap-3">
          <span class="material-symbols-outlined" style="font-size:18px">favorite</span> Wishlist
        </a>
        <form th:action="@{/logout}" method="post" class="mt-6">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit"
                  class="w-full font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors rounded px-4 py-3 flex items-center gap-3">
            <span class="material-symbols-outlined" style="font-size:18px">logout</span> Sign Out
          </button>
        </form>
      </nav>
    </aside>

    <!-- Main form area -->
    <div class="flex-grow flex flex-col gap-8 max-w-2xl">

      <!-- Flash messages -->
      <div th:if="${successMessage}"
           class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl text-sm">
        <span class="material-symbols-outlined" style="font-size:18px">check_circle</span>
        <span th:text="${successMessage}"></span>
      </div>
      <div th:if="${errorMessage}"
           class="flex items-center gap-2 bg-error-container border border-error/30 text-on-error-container px-4 py-3 rounded-xl text-sm">
        <span class="material-symbols-outlined" style="font-size:18px">error</span>
        <span th:text="${errorMessage}"></span>
      </div>

      <!-- Profile picture: initials only, no photo upload -->
      <section class="bg-surface-container-lowest border border-secondary-container rounded p-8 flex flex-col sm:flex-row items-center sm:items-start gap-7 shadow-sm">

        <!-- Initials circle -->
        <div class="w-28 h-28 rounded-full bg-primary-container flex items-center justify-center shrink-0 border-2 border-outline-variant select-none">
          <span class="text-3xl font-bold text-on-primary"
                th:text="${#strings.toUpperCase(#strings.substring(user.firstName,0,1)) + #strings.toUpperCase(#strings.substring(user.lastName,0,1))}">AB</span>
        </div>

        <!-- Name + info -->
        <div class="flex flex-col justify-center text-center sm:text-left gap-2">
          <h2 class="font-headline-md text-headline-md text-primary" th:text="${user.fullName}">Name</h2>
          <p class="font-body-md text-body-md text-on-surface-variant">
            Bibliotech member since <span th:text="${user.memberSince.year}">2024</span>
          </p>
          <p class="text-sm text-on-surface-variant" th:text="${user.email}">email@example.com</p>
        </div>
      </section>

      <!-- Personal info form -->
      <section class="bg-surface-container-lowest border border-secondary-container rounded p-8 shadow-sm">
        <h3 class="font-headline-md text-headline-md text-primary mb-6 pb-4 border-b border-secondary-container">Personal Details</h3>
        <form th:action="@{/account/profile}" method="post" th:object="${profileForm}" novalidate class="flex flex-col gap-6">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="font-label-sm text-label-sm text-on-surface-variant" for="firstName">First Name</label>
              <input id="firstName" th:field="*{firstName}" type="text" required
                     class="bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 font-body-md text-body-md text-primary placeholder-outline transition-colors"/>
              <span class="text-error text-xs" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
            </div>
            <div class="flex flex-col gap-2">
              <label class="font-label-sm text-label-sm text-on-surface-variant" for="lastName">Last Name</label>
              <input id="lastName" th:field="*{lastName}" type="text" required
                     class="bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 font-body-md text-body-md text-primary placeholder-outline transition-colors"/>
              <span class="text-error text-xs" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
            <input id="email" th:field="*{email}" type="email" required
                   class="bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 font-body-md text-body-md text-primary placeholder-outline transition-colors"/>
            <span class="text-error text-xs" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
          </div>
          <div class="flex flex-col gap-2">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="bio">Reading Preferences (Bio)</label>
            <textarea id="bio" th:field="*{bio}" rows="3"
                      class="bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 font-body-md text-body-md text-primary resize-none transition-colors"
                      placeholder="Primarily interested in..."></textarea>
          </div>
          <div class="pt-2 flex justify-end">
            <button type="submit"
                    class="bg-on-tertiary-container text-on-tertiary font-label-sm text-label-sm px-6 py-3 rounded hover:opacity-90 transition-opacity">
              Save Changes
            </button>
          </div>
        </form>
      </section>

      <!-- Change password form -->
      <section class="bg-surface-container-lowest border border-secondary-container rounded p-8 shadow-sm">
        <h3 class="font-headline-md text-headline-md text-primary mb-6 pb-4 border-b border-secondary-container">Security</h3>
        <form th:action="@{/account/profile/password}" method="post" th:object="${passwordForm}"
              id="pwdForm" novalidate class="flex flex-col gap-6">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="flex flex-col gap-2">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="currentPassword">Current Password</label>
            <div class="relative">
              <input id="currentPassword" th:field="*{currentPassword}" type="password"
                     placeholder="••••••••" required
                     class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 pr-8 font-body-md text-body-md text-primary transition-colors"/>
              <button type="button" onclick="togglePwd('currentPassword','eye0')"
                      class="absolute right-0 bottom-2 text-on-surface-variant hover:text-on-surface">
                <span id="eye0" class="material-symbols-outlined" style="font-size:18px">visibility_off</span>
              </button>
            </div>
            <span class="text-error text-xs" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="font-label-sm text-label-sm text-on-surface-variant" for="newPassword">New Password</label>
              <div class="relative">
                <input id="newPassword" th:field="*{newPassword}" type="password"
                       placeholder="Min. 8 chars" required minlength="8"
                       class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 pr-8 font-body-md text-body-md text-primary transition-colors"/>
                <button type="button" onclick="togglePwd('newPassword','eye1')"
                        class="absolute right-0 bottom-2 text-on-surface-variant hover:text-on-surface">
                  <span id="eye1" class="material-symbols-outlined" style="font-size:18px">visibility_off</span>
                </button>
              </div>
              <span class="text-error text-xs" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
            </div>
            <div class="flex flex-col gap-2">
              <label class="font-label-sm text-label-sm text-on-surface-variant" for="confirmPassword">Confirm New Password</label>
              <div class="relative">
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password"
                       placeholder="Confirm" required
                       class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary-container focus:ring-0 px-0 py-2 pr-8 font-body-md text-body-md text-primary transition-colors"/>
                <button type="button" onclick="togglePwd('confirmPassword','eye2')"
                        class="absolute right-0 bottom-2 text-on-surface-variant hover:text-on-surface">
                  <span id="eye2" class="material-symbols-outlined" style="font-size:18px">visibility_off</span>
                </button>
              </div>
              <span class="text-error text-xs" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
              <p class="text-error text-xs hidden" id="pwdMatchErr">Passwords do not match.</p>
            </div>
          </div>

          <div class="pt-2 flex justify-end">
            <button type="submit"
                    class="border border-primary text-primary font-label-sm text-label-sm px-6 py-3 rounded hover:bg-surface-container-high transition-colors">
              Update Password
            </button>
          </div>
        </form>
      </section>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/nav :: footer}"></th:block>

<script>
  // Password show/hide toggle
  function togglePwd(inputId, eyeId) {
    const inp = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    eye.textContent = inp.type === 'password' ? 'visibility_off' : 'visibility';
  }

  // Live confirm-password match check
  document.getElementById('confirmPassword').addEventListener('input', function() {
    const newPwd = document.getElementById('newPassword').value;
    const err = document.getElementById('pwdMatchErr');
    err.classList.toggle('hidden', !this.value || this.value === newPwd);
  });

  // Block submit if passwords don't match
  document.getElementById('pwdForm').addEventListener('submit', function(e) {
    const newPwd  = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (newPwd && confirm && newPwd !== confirm) {
      document.getElementById('pwdMatchErr').classList.remove('hidden');
      e.preventDefault();
    }
  });
</script>
</body>
</html>
