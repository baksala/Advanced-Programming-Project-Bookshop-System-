<!DOCTYPE html>
<html class="light" lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Wishlist – The Bibliotech</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">

<th:block th:replace="~{fragments/nav :: topnav}"></th:block>

<main class="flex-grow pt-[80px] pb-24">
  <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop mt-12">

    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 text-on-surface-variant text-sm mb-6">
      <a th:href="@{/}" class="hover:text-on-surface transition-colors">Home</a>
      <span class="material-symbols-outlined text-sm">chevron_right</span>
      <span>Wishlist</span>
    </div>

    <div class="flex items-center justify-between mb-8">
      <h1 class="font-headline-lg text-headline-lg text-on-surface">My Wishlist</h1>
      <a th:href="@{/catalog}" class="text-on-surface-variant hover:text-on-surface transition-colors text-sm flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">add</span> Add Books
      </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(wishlistItems)}" class="text-center py-24">
      <span class="material-symbols-outlined text-6xl text-on-surface-variant">favorite</span>
      <h2 class="font-headline-md text-on-surface mt-4">Your wishlist is empty</h2>
      <p class="text-on-surface-variant mt-2">Save books you love and come back to them anytime.</p>
      <a th:href="@{/catalog}" class="mt-6 inline-block bg-primary text-on-primary px-8 py-3 rounded font-semibold hover:bg-opacity-90 transition-all">Discover Books</a>
    </div>

    <!-- Wishlist grid (populated when wishlist feature is wired) -->
    <div th:if="${!#lists.isEmpty(wishlistItems)}" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-gutter">
      <div th:each="book : ${wishlistItems}" class="flex flex-col group">
        <div class="aspect-[2/3] bg-surface-container-lowest border border-secondary-fixed rounded mb-4 overflow-hidden group-hover:shadow-lg transition-shadow relative">
          <img th:src="${book.coverImageUrl}" th:alt="${book.title}"
               class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
          <form th:action="@{/account/wishlist/remove}" method="post" class="absolute top-2 right-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="bookId" th:value="${book.id}"/>
            <button type="submit" class="bg-white rounded-full p-1 shadow hover:bg-error-container transition-colors">
              <span class="material-symbols-outlined text-error text-sm">favorite</span>
            </button>
          </form>
        </div>
        <div class="flex flex-col gap-1 px-1">
          <h3 class="font-headline-md text-on-surface leading-tight" th:text="${book.title}">Title</h3>
          <p class="text-on-surface-variant text-sm" th:text="${book.author}">Author</p>
          <div class="flex justify-between items-center mt-2">
            <span class="font-semibold text-on-surface" th:text="'$' + ${book.price}">$0.00</span>
            <form th:action="@{/cart/add}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="bookId" th:value="${book.id}"/>
              <button type="submit" class="text-on-surface-variant hover:text-[#c86a47] p-2 rounded-full hover:bg-surface-container-highest transition-colors">
                <span class="material-symbols-outlined">add_shopping_cart</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Coming soon note for now -->
    <div class="mt-8 p-4 bg-surface-container border border-outline-variant rounded-xl text-center text-on-surface-variant text-sm">
      <span class="material-symbols-outlined align-middle mr-1 text-sm">info</span>
      Wishlist saving is coming soon. For now, browse our catalog and add books directly to your cart.
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/nav :: footer}"></th:block>
</body>
</html>
