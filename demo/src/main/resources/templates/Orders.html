<!DOCTYPE html>
<html class="light" lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Order History – The Bibliotech</title>
  <th:block th:replace="~{fragments/nav :: headstyles}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">

<th:block th:replace="~{fragments/nav :: topnav}"></th:block>

<main class="flex-grow pt-[80px] pb-24 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto w-full">

  <header class="mt-10 mb-12 max-w-3xl">
    <h1 class="font-headline-xl text-headline-xl text-on-surface mb-3">Order History</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant">Review your past acquisitions and track current shipments.</p>
  </header>

  <div class="flex flex-col gap-4">

    <article th:each="order : ${orders}"
             class="bg-surface-container-lowest border border-[#E5E2D9] p-6 md:p-8 flex flex-col md:flex-row gap-7 items-start md:items-center group hover:shadow-[0_8px_24px_-6px_rgba(19,27,46,0.06)] transition-all duration-300">

      <!-- Book cover(s): show up to 2, stacked -->
      <div class="flex -space-x-4 shrink-0">
        <!-- First book cover -->
        <div th:if="${!#lists.isEmpty(order.items)}"
             class="w-20 h-28 border border-[#E5E2D9] overflow-hidden bg-surface-variant shadow-sm"
             style="z-index:2">
          <img th:src="${order.items[0].book.coverImageUrl != null ? order.items[0].book.coverImageUrl : 'https://placehold.co/80x112/e6eeff/45464d?text=Book'}"
               th:alt="${order.items[0].book.title}"
               class="w-full h-full object-cover"
               onerror="this.src='https://placehold.co/80x112/e6eeff/45464d?text=Book'"/>
        </div>
        <!-- Second book cover (offset, if exists) -->
        <div th:if="${order.items.size() > 1}"
             class="w-20 h-28 border border-[#E5E2D9] overflow-hidden bg-surface-variant shadow-sm"
             style="z-index:1; transform:translateY(6px); opacity:0.8">
          <img th:src="${order.items[1].book.coverImageUrl != null ? order.items[1].book.coverImageUrl : 'https://placehold.co/80x112/e6eeff/45464d?text=Book'}"
               th:alt="${order.items[1].book.title}"
               class="w-full h-full object-cover"
               onerror="this.src='https://placehold.co/80x112/e6eeff/45464d?text=Book'"/>
        </div>
        <!-- Fallback icon when no items -->
        <div th:if="${#lists.isEmpty(order.items)}"
             class="w-20 h-28 border border-[#E5E2D9] flex items-center justify-center bg-surface-container">
          <span class="material-symbols-outlined text-outline-variant" style="font-size:28px">menu_book</span>
        </div>
      </div>

      <!-- Order info -->
      <div class="flex-grow flex flex-col gap-2">
        <div class="flex items-center gap-3 flex-wrap">
          <span class="font-label-sm text-label-sm text-on-surface-variant tracking-wider uppercase"
                th:text="'Order ' + ${order.orderNumber}">Order BBL-000000</span>
          <span class="w-1 h-1 rounded-full bg-outline-variant inline-block"></span>
          <time class="font-body-md text-body-md text-on-surface-variant"
                th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">Date</time>
        </div>
        <h2 class="font-headline-md text-headline-md text-on-surface leading-tight">
          <span th:if="${!#lists.isEmpty(order.items)}" th:text="${order.items[0].book.title}">Title</span>
          <span th:if="${order.items.size() > 1}"
                th:text="${' + ' + (order.items.size() - 1) + ' more item(s)'}"></span>
        </h2>
        <p class="font-body-md text-body-md text-on-surface-variant"
           th:text="${(order.shippingMethod != null ? order.shippingMethod : 'Standard') + ' · ' + (order.shippingAddress != null ? order.shippingAddress : '')}">
          Shipping info
        </p>
      </div>

      <!-- Status + total + button -->
      <div class="flex flex-col md:items-end gap-4 shrink-0 w-full md:w-auto">
        <div class="flex items-center justify-between md:justify-end gap-5 w-full">
          <span th:with="s=${order.status.name()}"
                th:class="${s == 'PENDING'}    ? 'font-label-sm text-label-sm px-3 py-1.5 rounded uppercase tracking-widest bg-yellow-100 text-yellow-800'
                         : (${s == 'PROCESSING'} ? 'font-label-sm text-label-sm px-3 py-1.5 rounded uppercase tracking-widest bg-blue-100 text-blue-800'
                         : (${s == 'SHIPPED'}    ? 'font-label-sm text-label-sm px-3 py-1.5 rounded uppercase tracking-widest bg-primary text-on-primary'
                         : (${s == 'DELIVERED'}  ? 'font-label-sm text-label-sm px-3 py-1.5 rounded uppercase tracking-widest bg-green-100 text-green-800'
                         : 'font-label-sm text-label-sm px-3 py-1.5 rounded uppercase tracking-widest bg-error-container text-error')))"
                th:text="${order.status}">STATUS</span>
          <span class="font-headline-md text-headline-md text-on-surface"
                th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</span>
        </div>
        <a th:href="@{/account/orders/{id}(id=${order.id})}"
           class="w-full md:w-auto border border-primary text-primary hover:bg-primary hover:text-on-primary transition-colors font-label-sm text-label-sm px-7 py-3 uppercase tracking-widest text-center">
          View Details
        </a>
      </div>
    </article>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-24">
      <span class="material-symbols-outlined text-6xl text-on-surface-variant">receipt_long</span>
      <h2 class="font-headline-md text-on-surface mt-4">No orders yet</h2>
      <p class="text-on-surface-variant mt-2">Explore our catalog and place your first order!</p>
      <a th:href="@{/catalog}" class="mt-6 inline-block bg-primary text-on-primary px-8 py-3 rounded font-semibold hover:opacity-90 transition-all">
        Browse Catalog
      </a>
    </div>
  </div>

</main>

<th:block th:replace="~{fragments/nav :: footer}"></th:block>
</body>
</html>
