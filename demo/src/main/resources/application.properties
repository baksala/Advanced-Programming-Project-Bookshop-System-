spring.application.name=Bibliotech

# ═══════════════════════════════════════════════════════════
#  MYSQL DATABASE
#  ► Change 'root' password below to match YOUR MySQL setup
#  ► Common passwords: root, admin, password, "" (empty)
# ═══════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotech?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=mysql1234

# ► If your MySQL has no password, leave spring.datasource.password= blank (as above)
# ► If your MySQL uses a password, set it:  spring.datasource.password=yourpassword

# ───────────────────────────────────────────────────────────
#  JPA / Hibernate
# ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ═══════════════════════════════════════════════════════════
#  THYMELEAF
# ═══════════════════════════════════════════════════════════
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ═══════════════════════════════════════════════════════════
#  SESSION
# ═══════════════════════════════════════════════════════════
server.servlet.session.timeout=2h

# ═══════════════════════════════════════════════════════════
#  FILE UPLOAD
# ═══════════════════════════════════════════════════════════
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ═══════════════════════════════════════════════════════════
#  ACTUATOR
# ═══════════════════════════════════════════════════════════
management.endpoints.web.exposure.include=health,info

# ═══════════════════════════════════════════════════════════
#  LOGGING
# ═══════════════════════════════════════════════════════════
logging.level.com.example=INFO
logging.level.org.springframework.security=WARN

# ═══════════════════════════════════════════════════════════
#  ERROR PAGE
# ═══════════════════════════════════════════════════════════
# Pass full error details to the custom error.html template
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.whitelabel.enabled=false

# ═══════════════════════════════════════════════════════════
#  EMAIL (Gmail SMTP)
#  ► Replace with your Gmail address and App Password
#  ► Get App Password: Google Account → Security → 2-Step Verification → App Passwords
# ═══════════════════════════════════════════════════════════
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=biblotech24@gmail.com
spring.mail.password=xyun dngv aiux uwhu
spring.mail.properties.mail.smtp.from=biblotech24@gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ═══════════════════════════════════════════════════════════
#  ASYNC (Multithreading)
# ═══════════════════════════════════════════════════════════
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=Bibliotech-Async-
